name: CodeQL

on:
  schedule:
    - cron: "21 9 4 * *"  # monthly scattered (was: 42 15 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@7e30269b4a42d8221f1e327fad674a69a740a79a # v1.6.0
    with:
      languages: "go"
