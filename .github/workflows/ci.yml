name: CI

# Triggers: every PR and every push to main.
# Job dependency graph:
#
#   secret-scan ─┐
#   fmt ─────────┼─→ lint ─┐
#                └─→ test ──┴─→ container-test ─→ container-build
#
# Any failure blocks all downstream jobs.
# GHCR push only runs on main of the origin repo (not fork PRs).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ github.event.repository.name }}

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  # Runs independently — credential leaks block everything else immediately.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        id: gitleaks
        uses: gacts/gitleaks@5730a84c1b79b49f35f64953e02270f1bf5c7d28
        with:
          version: latest
          config-path: .gitleaks.toml
          path: .
          github-token: ${{ github.token }}

      - name: Upload SARIF
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ${{ steps.gitleaks.outputs.sarif }}

  fmt:
    name: Format (gofmt)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      go-version: "1.25.8"
      working-directory: "."

  # ── 3. Vet + Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint (vet + golangci-lint)
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      go-version: "1.25.8"
      golangci-lint-version: "v1.64.8"
      working-directory: "."
      lint-args: "--timeout=5m"

  # ── 4. Test + Coverage + Vulnerability scan ────────────────────────────────
  test:
    name: Test
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      go-version: "1.25.8"
      working-directory: "."
      test-timeout: "120s"
      run-govulncheck: true
      coverage-artifact-name: "coverage"

  # ── 5. Container test stage ────────────────────────────────────────────────
  # Builds the 'test' Containerfile stage which re-runs tests inside the same
  # base image used in production — catches base-image / runtime divergence.
  container-test:
    name: Container (test stage)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build test stage
        run: |
          docker build \
            --target test \
            --tag ${{ env.IMAGE }}:test-${{ github.sha }} \
            --file Containerfile \
            .

  # ── 6. Container final image ───────────────────────────────────────────────
  container-build:
    name: Container (final + push)
    runs-on: ubuntu-latest
    needs: [container-test]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build final image
        run: |
          docker build \
            --target final \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --file Containerfile \
            .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
