name: Fuzz Testing

on:
  schedule:
    - cron: "0 3 * * 1"   # Mondays 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Per-target fuzz duration (e.g. 30s, 5m, 1h)'
        required: false
        default: '30s'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fuzz.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      packages: "./internal/hcl/... ./internal/rule/..."
      fuzz-time: ${{ inputs.fuzz-time || '30s' }}
