name: Fuzz Testing

on:
  schedule:
    - cron: "16 0 19 * *"  # monthly scattered (was: 0 2 1 * *)
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Per-target fuzz duration (e.g. 30s, 5m, 1h)'
        required: false
        default: '30s'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fuzz.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      packages: "./internal/hcl/... ./internal/rule/..."
      fuzz-time: ${{ inputs.fuzz-time || '30s' }}

  notify-failure:
    needs: [fuzz]
    if: failure()
    timeout-minutes: 5
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ [CI] ${context.workflow} failed (${new Date().toISOString().split('T')[0]})`,
              body: [
                `**Workflow:** ${context.workflow}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
