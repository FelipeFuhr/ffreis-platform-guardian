      path: .github/workflows/tests.yml
      pattern: "uses: ffreis/platform-workflows-go/"
  remediation:
    description: "Replace local test jobs with: uses: ffreis/platform-workflows-go/.github/workflows/go-test.yml@main"
---
apiVersion: guardian/v1
kind: Rule
